<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MAHJONG ARCADE</title>
    <meta name="theme-color" content="#0a0021">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mahjong Arcade">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <style>
        :root{ --neon-cyan:#00f6ff; --neon-pink:#ff2ee6; --neon-yellow:#ffe600; --bg-dark:#0a0021; --bg-grid:#1a0a3a; --panel:#1f0a40; }
        *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
        html,body{ margin:0; padding:0; height:100%; background: var(--bg-dark); font-family:sans-serif; color:#fff; overflow:hidden; user-select:none; touch-action: none; }
        body{ background: radial-gradient(ellipse at center, #2a0b55 0%, #0a0021 70%); }
        .screen{ position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
        .hidden{display:none !important;}
        .title{ font-size: 32px; letter-spacing:4px; color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-pink); margin-bottom: 40px; text-align:center; }
        .menu{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px; }
        .btn{ font-family:inherit; font-size: 14px; color:#fff; background: #1f0a40; border:2px solid var(--neon-cyan); border-radius:6px; padding:12px; text-align:center; cursor:pointer; }
        .btn:active{ background: var(--neon-cyan); color:#000; }
        .hud{ width:100%; display:flex; justify-content:space-between; font-size:12px; color:var(--neon-cyan); padding:10px; }
        .board-wrap{ flex:1; width:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
        .board{ position:relative; transform-origin: center center; }
        .tile{ position:absolute; width: 50px; height: 65px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size: 24px; background: #fff; border:2px solid #333; cursor:pointer; }
        .tile.locked{ filter: brightness(0.4); }
        .tile.selected{ border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); transform: scale(1.1); }
        .overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    </style>
</head>
<body>
    <div id="mainMenu" class="screen">
        <div class="title">MAHJONG</div>
        <div class="menu">
            <button class="btn" id="btnNew">AVVIA PARTITA</button>
            <button class="btn" id="btnExit">ESCI</button>
        </div>
    </div>

    <div id="gameScreen" class="screen hidden">
        <div class="hud">
            <div>LIV. <span id="hudLevel">1</span></div>
            <div>MOSSE <span id="hudMoves">0</span></div>
        </div>
        <div class="board-wrap" id="boardWrap"><div class="board" id="board"></div></div>
        <button class="btn" id="inAbort" style="margin-top:10px;">MENU</button>
    </div>

    <script>
        const GLYPHS = ['🦜','🐚','🎍','🌿','🐉','🍀','🌺','🐠','🦋','🌸','🍄','🌴','🐢','🦢','🌻','🍃','⚓','🏆','⚽','🎯','🌊','🔥','💎','⭐','🌙','☀️','🍉','🎵','🦚','🐝','🌹','🍁','🐞','🌵','🪷','🎋'];
        let state = null;
        let selectedId = null;

        function buildLayout(level){
            const cols = Math.min(4 + Math.floor(level * 0.5), 14);
            const rows = Math.min(4 + Math.floor(level * 0.4), 10);
            const layers = Math.min(1 + Math.floor(level * 0.25), 6);
            let cells = [];
            for(let z=0; z<layers; z++){
                const c = cols - 2*z, r = rows - 2*z;
                if(c < 2 || r < 2) break;
                for(let y=0; y<r; y++){
                    for(let x=0; x<c; x++){ cells.push({x: x+z, y: y+z, z}); }
                }
            }
            if(cells.length % 2 !== 0) cells.pop();
            return {cells, cols, rows, layers};
        }

        function newGame(level){
            const {cells} = buildLayout(level);
            const numTypes = Math.min(36, 3 + Math.floor(level * 1.2));
            let typeAssign = [];
            for(let i=0; i<cells.length/2; i++) { typeAssign.push(i % numTypes, i % numTypes); }
            typeAssign.sort(() => Math.random() - 0.5);
            let board = cells.map((c, idx) => ({ id: idx, x: c.x, y: c.y, z: c.z, type: typeAssign[idx], removed: false }));
            return { level, board, moves: 0 };
        }

        function renderBoard(){
            const boardEl = document.getElementById('board');
            const wrapEl = document.getElementById('boardWrap');
            boardEl.innerHTML = '';

            let maxX = 0, maxY = 0;
            state.board.filter(t => !t.removed).forEach(t => {
                const el = document.createElement('div');
                el.className = `tile ${t.id === selectedId ? 'selected' : ''}`;
                el.innerHTML = GLYPHS[t.type];
                const left = t.x*45 + t.z*8;
                const top = t.y*60 + t.z*8;
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                el.style.zIndex = t.z * 10;
                el.onclick = () => onTileClick(t.id);
                boardEl.appendChild(el);
                maxX = Math.max(maxX, left + 50);
                maxY = Math.max(maxY, top + 65);
            });

            // Give the board an intrinsic size so flex centering can act on it
            boardEl.style.width = maxX + 'px';
            boardEl.style.height = maxY + 'px';

            // Scale the board to fit within the available area, keeping it centered
            const wrapW = wrapEl.clientWidth;
            const wrapH = wrapEl.clientHeight;
            const scale = Math.min(wrapW / maxX, wrapH / maxY, 1);
            boardEl.style.transform = `scale(${scale})`;

            document.getElementById('hudLevel').textContent = state.level;
            document.getElementById('hudMoves').textContent = state.moves;
        }

        function onTileClick(id){
            const tile = state.board.find(t=>t.id===id);
            if(selectedId === id) { selectedId = null; }
            else if(selectedId === null) { selectedId = id; }
            else {
                const other = state.board.find(t=>t.id===selectedId);
                if(other.type === tile.type) {
                    other.removed = true; tile.removed = true;
                    state.moves++;
                    selectedId = null;
                } else { selectedId = id; }
            }
            renderBoard();
            if(!state.board.find(t=>!t.removed)) {
                alert("Livello superato!");
                state = newGame(state.level + 1);
                renderBoard();
            }
        }

        document.getElementById('btnNew').onclick = () => { state = newGame(1); document.getElementById('mainMenu').classList.add('hidden'); document.getElementById('gameScreen').classList.remove('hidden'); renderBoard(); };
        document.getElementById('inAbort').onclick = () => { document.getElementById('mainMenu').classList.remove('hidden'); document.getElementById('gameScreen').classList.add('hidden'); };

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        window.addEventListener('resize', () => { if(state) renderBoard(); });
    </script>
</body>
</html>
